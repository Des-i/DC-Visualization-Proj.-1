
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC 311 Data Visualization (2020-2026)</title>
    <style>
        body { 
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #ffffff; 
        }
        .header { text-align: center; margin-bottom: 40px; }
        .chart-container { 
            margin-bottom: 60px; 
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        h1 { color: #2c3e50; font-size: 2.2em; }
        h2 { color: #34495e; font-size: 1.5em; margin-bottom: 20px; }
        iframe { width: 100%; height: 600px; border: none; }
        footer { text-align: center; color: #bdc3c7; font-size: 0.8em; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NYC 311 Service Request Dashboard</h1>
        <p>Interactive Visualizations (2020 - 2026)</p>
    </div>

    <div class="chart-container">
        <h2>Complaints Over Time</h2>
        <iframe src="line_chart.html"></iframe>
    </div>

    <div class="chart-container">
        <h2>Top Growing Complaint Types</h2>
        <iframe src="growth_chart.html"></iframe>
    </div>

    <div class="chart-container">
        <h2>Major Complaints by Borough</h2>
        <iframe src="borough_chart.html"></iframe>
    </div>

    <footer>
        <p>Data Source: NYC Open Data Portal</p>
    </footer>

</body>
</html>
